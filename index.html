<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mary Kambo | Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050507;
      --bg-soft: #0b0b12;
      --text: #f7f4ff;
      --muted: #c5bdd8;
      --purple: #7c3aed;
      --purple-soft: #c4a7ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.12), transparent 25%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--text);
      font-family: "Inter", sans-serif;
      text-align: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.25), transparent 80%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 620px;
    }

    .script {
      font-family: "Great Vibes", cursive;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: var(--purple-soft);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3rem, 8vw, 5.2rem);
      font-weight: 600;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      opacity: 0;
      animation: reveal 1s ease forwards;
      animation-delay: 0.25s;
    }

    h1 span {
      color: var(--purple-soft);
    }

    .tagline {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      color: var(--muted);
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.5s;
    }

    .note {
      font-size: 0.98rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.75s;
    }

    .note a {
      color: var(--purple-soft);
      text-decoration: none;
    }

    .note a:hover {
      text-decoration: underline;
    }

    .line {
      width: 64px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple-soft), transparent);
      margin: 0 auto 22px;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.65s;
    }

    @keyframes reveal {
      0% {
        opacity: 0;
        transform: translateY(18px);
        letter-spacing: 0.08em;
        filter: blur(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        letter-spacing: -0.02em;
        filter: blur(0);
      }
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(16px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 0.9;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .script,
      h1,
      .tagline,
      .note,
      .line {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="script">Something elegant is coming</div>
    <h1>Mary <span>Kambo</span></h1>
    <div class="tagline">Securing systems. Shaping conversations.</div>
    <div class="line"></div>
    <p class="note">
      Portfolio launching soon ·
      <a href="https://www.linkedin.com/in/mary-kambo/" target="_blank" rel="noopener">LinkedIn</a>
    </p>
  </main>
</body>
</html>
