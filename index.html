<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mary Kambo | Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050507;
      --bg-soft: #0b0b12;
      --text: #f7f4ff;
      --muted: #c5bdd8;
      --purple: #7c3aed;
      --purple-soft: #c4a7ff;
      --border: rgba(255,255,255,0.10);
      --card: rgba(255,255,255,0.04);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.12), transparent 25%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--text);
      font-family: "Inter", sans-serif;
      text-align: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.25), transparent 80%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 760px;
      width: 100%;
    }

    .script {
      font-family: "Great Vibes", cursive;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: var(--purple-soft);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3rem, 8vw, 5.2rem);
      font-weight: 600;
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      opacity: 0;
      animation: reveal 1s ease forwards;
      animation-delay: 0.25s;
    }

    h1 span {
      color: var(--purple-soft);
    }

    .tagline {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      color: var(--muted);
      margin-bottom: 22px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.5s;
    }

    .line {
      width: 64px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple-soft), transparent);
      margin: 0 auto 28px;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.65s;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(80px, 120px));
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.8s;
    }

    .time-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .time-value {
      display: block;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2rem, 5vw, 2.7rem);
      line-height: 1;
      color: var(--text);
      margin-bottom: 6px;
    }

    .time-label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .note {
      font-size: 0.98rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.95s;
    }

    .note a {
      color: var(--purple-soft);
      text-decoration: none;
    }

    .note a:hover {
      text-decoration: underline;
    }

    @keyframes reveal {
      0% {
        opacity: 0;
        transform: translateY(18px);
        letter-spacing: 0.08em;
        filter: blur(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        letter-spacing: -0.02em;
        filter: blur(0);
      }
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(16px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 0.9; }
    }

    @media (max-width: 560px) {
      .countdown {
        grid-template-columns: repeat(2, minmax(100px, 1fr));
        max-width: 260px;
        margin-left: auto;
        margin-right: auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .script,
      h1,
      .tagline,
      .line,
      .countdown,
      .note {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="script">Something elegant is coming</div>
    <h1>Mary <span>Kambo</span></h1>
    <div class="tagline">Securing systems. Shaping conversations.</div>
    <div class="line"></div>

    <section class="countdown" aria-label="Countdown to launch">
      <div class="time-box">
        <span class="time-value" id="days">00</span>
        <span class="time-label">Days</span>
      </div>
      <div class="time-box">
        <span class="time-value" id="hours">00</span>
        <span class="time-label">Hours</span>
      </div>
      <div class="time-box">
        <span class="time-value" id="minutes">00</span>
        <span class="time-label">Minutes</span>
      </div>
      <div class="time-box">
        <span class="time-value" id="seconds">00</span>
        <span class="time-label">Seconds</span>
      </div>
    </section>

    <p class="note">
     Portfolio launching soon ·
      <a href="https://www.linkedin.com/in/mary-kambo/" target="_blank" rel="noopener">LinkedIn</a>
    </p>
  </main>

  <script>
    // Set your launch date here
    const launchDate = new Date("2026-04-15T00:00:00").getTime();

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      daysEl.textContent = String(days).padStart(2, "0");
      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
